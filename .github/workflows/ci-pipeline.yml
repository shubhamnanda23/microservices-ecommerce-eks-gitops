name: Build and Push Microservices

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Isse warning hat jayegi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shop-frontend:latest ./frontend-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shop-frontend:latest

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/shop-backend:latest ./backend-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/shop-backend:latest
