name: Deploy to EKS

on:
  push:
    branches:
      - main  # Jab main branch par push hoga tab chalega

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push Backend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: my-backend
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend-service
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Update EKS Kubeconfig
      run: aws eks update-kubeconfig --name <YOUR_CLUSTER_NAME> --region ap-south-1

    - name: Deploy to EKS
      run: |
        kubectl apply -f backend-service/k8s/
        kubectl apply -f frontend-service/k8s/
        kubectl rollout restart deployment backend-deployment
        kubectl rollout restart deployment frontend-deployment